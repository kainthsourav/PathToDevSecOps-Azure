apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

bases:
  - ../../base

images:
  - name: demoapi                    # matches image name in base deployment.yaml
    newName: demoapi                 # placeholder — pipeline overwrites this
    newTag: latest                   # placeholder — pipeline overwrites this

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: demoapi-deployment
      spec:
        replicas: 1
        template:
          spec:
            containers:
            - name: demoapi
              env:
              - name: ASPNETCORE_ENVIRONMENT
                value: "Development"