apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

bases:
  - ../../base

# Replace image — Kustomize handles this natively
images:
  - name: demoapi
    newName: acrdemosouravdev.azurecr.io/demoapi
    newTag: latest    # pipeline overrides this with github.sha

# Override environment specific values
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: demoapi-deployment
      spec:
        replicas: 1
        template:
          spec:
            containers:
            - name: demoapi
              env:
              - name: ASPNETCORE_ENVIRONMENT
                value: "Development"