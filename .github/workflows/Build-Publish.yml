name: Build and Publish
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: dev 
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }} 

      - name: Build Docker image
        run: | 
         docker build -f docker/DemoApi.Dockerfile -t demoapi:latest .

      - name: Tag Docker image
        run: | 
         docker tag demoapi:latest ${{secrets.ACR_NAME}}.azurecr.io/demoapi:${{github.sha}}

      - name: Push Docker image to ACR
        run: | 
         docker push ${{secrets.ACR_NAME}}.azurecr.io/demoapi:${{github.sha}} 
