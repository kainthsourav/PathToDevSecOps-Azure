name: Security Scanning

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # -----------------------------------------------
  # SECRET SCANNING — runs first, blocks everything
  # -----------------------------------------------
  secret-scan:
    name: Secret Scan — Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0        # scan full Git history not just latest commit

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -----------------------------------------------
  # CODE QUALITY — SonarCloud
  # -----------------------------------------------
  code-quality:
    name: Code Quality — SonarCloud
    runs-on: ubuntu-latest
    needs: secret-scan          # only runs if secret scan passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0        # SonarCloud needs full history for blame info

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}