name: App-Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'docker/**'
      - 'k8s/**'
  workflow_dispatch:
    inputs:
      IMAGE_TAG:
        description: 'Image tag to deploy (leave empty to build new)'
        required: false
        default: ''
      target_environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: app-${{ github.ref }}
  cancel-in-progress: false  # never cancel mid-deployment

env:
  IMAGE_TAG: ${{ github.event.inputs.IMAGE_TAG || github.sha }}

jobs:
  # -----------------------------------------------
  # BUILD
  # -----------------------------------------------
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    environment: dev
    if: |
      github.event_name == 'push' ||
      github.event.inputs.IMAGE_TAG == ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push to Dev ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          docker buildx build \
            --platform linux/amd64 \
            -f docker/DemoApi.Dockerfile \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/demoapi:${{ env.IMAGE_TAG }} \
            --push .

  # -----------------------------------------------
  # DEPLOY DEV
  # -----------------------------------------------
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    if: |
      always() &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (github.event_name == 'push' || github.event.inputs.target_environment == 'dev')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2
        
      - name: Deploy to Dev AKS
        run: |
         cd k8s/overlays/dev
         kustomize edit set image demoapi=${{ secrets.ACR_NAME }}.azurecr.io/demoapi:${{ env.IMAGE_TAG }}
         kubectl apply -k .

  # -----------------------------------------------
  # PROMOTE TO STAGING
  # -----------------------------------------------
  promote-staging:
    name: Promote Image to Staging ACR
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: staging
    if: |
      always() &&
      (needs.deploy-dev.result == 'success' || needs.deploy-dev.result == 'skipped') &&
      (github.event_name == 'push' ||
       github.event.inputs.target_environment == 'dev' ||
       github.event.inputs.target_environment == 'staging')

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Import image from Dev ACR to Staging ACR
        run: |
          az acr import \
            --name ${{ secrets.ACR_NAME }} \
            --source ${{ secrets.DEV_ACR_NAME }}.azurecr.io/demoapi:${{ env.IMAGE_TAG }} \
            --image demoapi:${{ env.IMAGE_TAG }} \
            --force

  # -----------------------------------------------
  # DEPLOY STAGING
  # -----------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: promote-staging
    environment: staging
    if: |
      always() &&
      needs.promote-staging.result == 'success' &&
      (github.event_name == 'push' ||
       github.event.inputs.target_environment == 'dev' ||
       github.event.inputs.target_environment == 'staging')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Deploy to Staging AKS
        run: |
         cd k8s/overlays/staging
         kustomize edit set image demoapi=${{ secrets.ACR_NAME }}.azurecr.io/demoapi:${{ env.IMAGE_TAG }}
         kubectl apply -k .

  # -----------------------------------------------
  # PROMOTE TO PROD
  # always imports from dev ACR — source of truth
  # -----------------------------------------------
  promote-prod:
    name: Promote Image to Prod ACR
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: prod
    if: |
      always() &&
      (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped')

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Import image from STAGING ACR to Prod ACR
        run: |
          az acr import \
            --name ${{ secrets.ACR_NAME }} \
            --source ${{ secrets.STAGING_ACR_NAME }}.azurecr.io/demoapi:${{ env.IMAGE_TAG }} \
            --image demoapi:${{ env.IMAGE_TAG }} \
            --force

  # -----------------------------------------------
  # DEPLOY PROD — manual approval gate
  # -----------------------------------------------
  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: promote-prod
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          
      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Deploy to Prod AKS
        run: |
         cd k8s/overlays/prod
         kustomize edit set image demoapi=${{ secrets.ACR_NAME }}.azurecr.io/demoapi:${{ env.IMAGE_TAG }}
         kubectl apply -k .