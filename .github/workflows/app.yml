name: App-Build and Deploy
on:
  push:
    branches:
      - main
    paths:
      - 'DemoApi/**'        # runs when app code changes
      - 'docker/**'         # runs when Dockerfile changes
      - 'k8s/**'            # runs when k8s manifests change
  workflow_dispatch:
    inputs:
      IMAGE_TAG:
        description: 'Image tag to deploy (defaults to commit SHA)'
        required: false
        default: ''
      target-environment:
        description: 'Environment to deploy to (dev, staging, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
  
concurrency:
  group: app-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_TAG: ${{ github.event.inputs.IMAGE_TAG || github.sha }}  # use input tag or fallback to commit SHA

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    environment: dev
    if: |
      github.event_name=='push' ||
      github.event.inputs.IMAGE_TAG == ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Build and Push to Dev ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }} 
          docker buildx build \
          --platform linux/amd64 \
          -f docker/DemoApi.Dockerfile \
          -t ${{ secrets.ACR_NAME }}.azurecr.io/demoapi:${{ env.IMAGE_TAG }} \
          --push .

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    if: |
      always() &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (github.event_name == 'push' || github.event.inputs.target-environment == 'dev')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy to AKS
        uses: azure/k8s-deploy@v4
        with:
          manifests: |
            k8s/deployment.yaml
            k8s/service.yaml
            k8s/hpa.yaml
          images: |
            ${{ secrets.ACR_NAME }}.azurecr.io/demoapi:${{ github.sha }}

  # -----------------------------------------------
  # PROMOTE AND DEPLOY STAGING — after dev succeeds
  # -----------------------------------------------
  promote-staging:
    name: Promote to Staging
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: staging
    if: |
      always() &&
      (needs.deploy-dev.result == 'success' || needs.deploy-dev.result == 'skipped') &&
      (github.event_name == 'push' ||
       github.event.inputs.target-environment == 'dev' ||
       github.event.inputs.target-environment == 'staging')

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Import image to Staging ACR
        run: |
          az acr import \
            --name ${{ secrets.ACR_NAME }} \
            --source ${{ secrets.DEV_ACR_NAME }}.azurecr.io/demoapi:${{ env.IMAGE_TAG }} \
            --image demoapi:${{ env.IMAGE_TAG }} \
            --force

# Deploy to staging cluster using same image tag (imported from dev ACR)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: promote-staging
    environment: staging
    if: |
      always() &&
      needs.promote-staging.result == 'success' &&
      (github.event_name == 'push' ||
      github.event.inputs.target-environment == 'dev' ||
      github.event.inputs.target-environment == 'staging')
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          
      - name: Deploy to AKS
        uses: azure/k8s-deploy@v4
        with:
          manifests: |
            k8s/deployment.yaml
            k8s/service.yaml
            k8s/hpa.yaml
          images: |
            ${{ secrets.ACR_NAME }}.azurecr.io/demoapi:${{ env.IMAGE_TAG }}

# PROMOTE TO PROD — after staging succeeds, requires manual approval
  promote-prod:
    name: Promote to Prod
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: prod
    if: |
      always() &&
      (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped')

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Import image to Prod ACR
        run: |
          az acr import \
            --name ${{ secrets.ACR_NAME }} \
            --source ${{ secrets.STAGING_ACR_NAME }}.azurecr.io/demoapi:${{ env.IMAGE_TAG }} \
            --image demoapi:${{ env.IMAGE_TAG }} \
            --force

  # -----------------------------------------------
  # DEPLOY PROD — after staging, requires approval
  # -----------------------------------------------
  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: promote-prod
    environment: prod       # manual approval gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          
      - name: Deploy to AKS
        uses: azure/k8s-deploy@v4
        with:
          manifests: |
            k8s/deployment.yaml
            k8s/service.yaml
            k8s/hpa.yaml
          images: |
            ${{ secrets.ACR_NAME }}.azurecr.io/demoapi:${{ github.sha }}
